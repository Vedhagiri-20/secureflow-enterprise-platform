<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureFlow Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="page-wrapper">

    <div class="login-shell">

        <div class="login-panel">

            <div class="brand">
                <div class="brand-logo">S</div>
                <div>
                    <h2>SecureFlow</h2>
                    <p>Enterprise Platform</p>
                </div>
            </div>

            <div class="login-content">
                <span class="welcome-badge">Secure Access</span>
                <h1>Welcome Back</h1>
                

                <form onsubmit="login(event)">

                    <label>User Role</label>
                    <select id="role">
                        <option value="">Select Role</option>
                        <option value="employee">Employee</option>
                        <option value="manager">Manager</option>
                        <option value="admin">Admin</option>
                    </select>

                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email">

                    <label>Password</label>
                    <div class="password-box">
                        <input type="password" id="password" placeholder="Enter your password">
                        <button type="button" class="toggle-btn" onclick="togglePassword()">Show</button>
                    </div>

                    <div class="options-row">
                        <label class="remember">
                            <input type="checkbox">
                            Remember me
                        </label>

                        <a href="../forgot-password/forgot-password.html">Forgot Password?</a>
                    </div>

                    <p id="error-message"></p>

                    <button type="submit" class="login-btn">Login</button>

                </form>
            </div>

        </div>

<div class="visual-panel">

    <div class="secureflow-diagram">

        <div class="diagram-badge">
            Smart workflow routing for banking approvals
        </div>

        <h2>SecureFlow approval engine</h2>
     

        <div class="flow-area">

            <div class="flow-node left-node employee-node">
                Employee
            </div>

            <div class="flow-node left-node manager-node">
                Manager
            </div>

            <div class="flow-node left-node senior-node">
                Senior Manager
            </div>

            <div class="center-engine">
                <div class="engine-ring">
                    <span>Secure<br>Flow</span>
                </div>
            </div>

            <div class="flow-node right-node home-loan">
                Home Loan
            </div>

            <div class="flow-node right-node car-loan">
                Car Loan
            </div>

            <div class="flow-node right-node personal-loan">
                Personal Loan
            </div>

            <div class="decision-card approve-card">
                Approved
            </div>

            <div class="decision-card reject-card">
                Rejected
            </div>

        </div>

    </div>

</div>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
